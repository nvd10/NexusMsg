name: Diagnose Project Structure

on: [push]

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Show complete structure
        run: |
          echo "=== Current directory ==="
          pwd
          echo ""
          echo "=== All files in repository ==="
          find . -type f -not -path "./.git/*" | sort
          echo ""
          echo "=== Check if gradlew exists ==="
          if [ -f "./gradlew" ]; then
            echo "✅ gradlew exists"
            cat ./gradlew | head -5
          else
            echo "❌ gradlew does NOT exist"
          fi
          echo ""
          echo "=== Check gradle/wrapper directory ==="
          if [ -d "./gradle/wrapper" ]; then
            echo "✅ gradle/wrapper exists"
            ls -la ./gradle/wrapper/
          else
            echo "❌ gradle/wrapper does NOT exist"
          fi
          echo ""
          echo "=== Find any build.gradle files ==="
          find . -name "build.gradle*" -type f || echo "No build.gradle files found!"
