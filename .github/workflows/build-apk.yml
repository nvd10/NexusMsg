name: Build NexusMsg APK (arm64-v8a)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.2'

      - name: Build debug APK (arm64-v8a)
        run: gradle assembleDebug --stacktrace
        
      - name: Build release APK (arm64-v8a)
        run: gradle assembleRelease --stacktrace

      - name: Find APKs
        run: |
          echo "=== Debug APKs ==="
          find app/build/outputs -name "*.apk" -type f
          echo "=== File sizes ==="
          find app/build/outputs -name "*.apk" -type f -exec ls -lh {} \;

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: nexusmsg-arm64-v8a-debug
          path: app/build/outputs/apk/debug/*.apk
          
      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: nexusmsg-arm64-v8a-release
          path: app/build/outputs/apk/release/*.apk
